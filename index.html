<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/img/7_statusbars/3_icons/icon_coin.png" type="image/png" />
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- Systems (no dependencies) -->
    <script src="models/systems/sound-manager.class.js"></script>
    <script src="models/systems/asset-loader.class.js"></script>
    <script src="models/systems/global-interval-manager.class.js"></script>
    <script src="models/systems/keyboard.class.js"></script>

    <script src="js/global.js"></script>

    <!-- Base Classes -->
    <script src="models/base/drawable-object.class.js"></script>
    <script src="models/base/movable-objects.class.js"></script>
    <script src="models/base/collectable-objects.class.js"></script>

    <!-- Environment (extends DrawableObject) -->
    <script src="models/environment/background-object.class.js"></script>
    <script src="models/environment/clouds.class.js"></script>

    <!-- Collectables (extends CollectableObjects) -->
    <script src="models/collectables/collectable-coins.class.js"></script>
    <script src="models/collectables/collectable-bottle.class.js"></script>

    <!-- UI (extends DrawableObject) -->
    <script src="models/ui/status-bar.class.js"></script>
    <script src="models/ui/level-display.class.js"></script>
    <script src="models/ui/game-timer.class.js"></script>
    <script src="models/ui/debug-overlay.class.js"></script>

    <!-- Entities (extends MovableObjects) -->
    <script src="models/entities/character.class.js"></script>
    <script src="models/entities/chicken.class.js"></script>
    <script src="models/entities/chicken-small.class.js"></script>
    <script src="models/entities/endboss.class.js"></script>

    <!-- Systems (depends on entities) -->
    <script src="models/systems/thowable-object.class.js"></script>
    <script src="models/systems/level.class.js"></script>
    <script src="models/systems/world.class.js"></script>
    <script src="js/level-gen-functions.js"></script>
    <script src="js/game.js"></script>
    <script src="js/level-creator.js"></script>
    <script src="js/start.js"></script>
    <script src="js/template.js"></script>
    <title>El-Polo-Loco-Game</title>
</head>

<body onload="init()">
    <!-- Rotate Screen - wird nur auf Mobile im Portrait angezeigt -->
    <div id="rotate-screen" class="rotate-screen">
        <div class="rotate-content">
            <div class="rotate-icon">📱</div>
            <h2>Please Rotate Your Device</h2>
            <p>This game is best played in landscape mode.</p>
        </div>
    </div>

    <main>
        <h1>El Polo Loco</h1>
        <div id="game_container"></div>
    </main>

</body>

</html>
